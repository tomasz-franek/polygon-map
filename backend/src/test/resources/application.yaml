spring:
  application:
    name: polygonMap
  datasource:
    hikari:
      minimumIdle: 2
      maximumPoolSize: 50
      idleTimeout: 120000
      connectionTimeout: 300000
      leakDetectionThreshold: 1800000
  data:
    mongodb:
      user: user
      password: password
      uri: mongodb://127.0.0.1:27017/test_db
      driver-class-name: liquibase.ext.mongodb.database.MongoClientDriver
      autoCommit: true
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-test.yaml
server:
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 200
